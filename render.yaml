services:
  - type: web
    name: agapenotes
    runtime: docker
    plan: starter
    region: ohio
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    disk:
      name: agapenotes-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: AGAPE_DB_PATH
        value: /var/data/agapenotes.db
      - key: STATIC_DIR
        value: /app/dist
      - key: COOKIE_SECURE
        value: "true"
      - key: RUST_LOG
        value: agapenotes_server=info,tower_http=info
      - key: SESSION_TTL_DAYS
        value: "30"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_SQL_TOKEN
        sync: false
      - key: CODEX_ADMIN_SQL_TOKEN
        sync: false
