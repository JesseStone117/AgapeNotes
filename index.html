<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="AgapeNotes - Track and manage your Staff, Students, and Supporters with ease">
    <meta name="theme-color" content="#D4A853" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AgapeNotes">
    <title>AgapeNotes</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital@0;1&display=swap"
        rel="stylesheet">

    <!-- WYSIWYG Editor -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="/styles/modal-extensions.css">
    <link rel="stylesheet" href="/styles/schedule.css">
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left"></div>
            <div class="header-center">
                <h1 class="app-title">Agape<span class="gold">Notes</span></h1>
            </div>
            <div class="header-right" id="header-action">
                <!-- Search button will be added dynamically for notes view -->
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <!-- Views will be rendered here -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="notes" aria-label="Notes">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
                    <rect x="9" y="3" width="6" height="4" rx="1" />
                    <path d="M9 12h6M9 16h6" />
                </svg>
            </button>
            <button class="nav-item" data-view="resources" aria-label="Resources">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
                </svg>
            </button>
            <button class="nav-item" data-view="schedule" aria-label="Schedule">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
            </button>
            <button class="nav-item" data-view="me" aria-label="For Me">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21a8 8 0 10-16 0"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </button>
            <button class="nav-item" data-view="settings" aria-label="Settings">
                <!-- Settings icon: gear in light mode, moon in dark mode -->
                <svg class="nav-icon settings-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
                <svg class="nav-icon settings-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" style="display: none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
            <div class="nav-indicator"></div>
        </nav>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="modal-container" aria-hidden="true">
        <div class="modal-backdrop"></div>
        <!-- Modal layers will be injected here dynamically -->
    </div>

    <!-- Editor Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/history.js"></script>
    <script src="js/apiClient.js"></script>
    <script src="js/cryptoVault.js"></script>
    <script src="js/pinAuth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/models.js"></script>
    <script src="js/state.js"></script>
    <script src="js/components/dialog.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/navigation.js"></script>
    <script src="js/components/categoryTabs.js"></script>
    <script src="js/components/personCard.js"></script>
    <script src="js/components/personDetail.js"></script>
    <script src="js/components/pinScreen.js"></script>
    <script src="js/components/search.js"></script>
    <script src="js/views/notesView.js"></script>
    <script src="js/views/settingsView.js"></script>
    <script src="js/views/resourcesView.js"></script>
    <script src="js/views/scheduleView.js"></script>
    <script src="js/views/meView.js"></script>
    <script src="js/updater.js"></script>
    <script src="js/app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        const serviceWorkerMode = '%MODE%';
        const shouldRegisterServiceWorker = 'serviceWorker' in navigator && serviceWorkerMode !== 'development';

        if (shouldRegisterServiceWorker) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
                    .then(reg => {
                        console.log('SW registered');
                        if (typeof AppUpdater !== 'undefined' && AppUpdater.observeRegistration) {
                            AppUpdater.observeRegistration(reg);
                        }
                    })
                    .catch(err => console.log('SW registration failed:', err));
            });
        } else if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations()
                .then(registrations => registrations.forEach(reg => reg.unregister()))
                .catch(err => console.log('SW cleanup skipped:', err));
        }

        // Initialize theme immediately to prevent flash
        ThemeManager.init();
    </script>
</body>

</html>
